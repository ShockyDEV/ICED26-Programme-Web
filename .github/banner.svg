<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" width="1280" height="360" role="img" aria-label="ICED26 — Live Programme">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FDFBF7"></stop>
      <stop offset="100%" stop-color="#F7F2EA"></stop>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E89669" stop-opacity="0.55"></stop>
      <stop offset="60%" stop-color="#E89669" stop-opacity="0.12"></stop>
      <stop offset="100%" stop-color="#E89669" stop-opacity="0"></stop>
    </radialGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2"></feGaussianBlur>
    </filter>
  </defs>

  
  <rect width="1280" height="360" fill="url(#bg)"></rect>

  
  <g opacity="0.08" fill="#2B2724">
    <circle cx="120" cy="60" r="1.6"></circle>
    <circle cx="220" cy="40" r="1.1"></circle>
    <circle cx="340" cy="90" r="1.4"></circle>
    <circle cx="450" cy="50" r="1.2"></circle>
    <circle cx="980" cy="70" r="1.6"></circle>
    <circle cx="1100" cy="40" r="1.1"></circle>
    <circle cx="1190" cy="95" r="1.3"></circle>
    <circle cx="80" cy="290" r="1.4"></circle>
    <circle cx="200" cy="320" r="1.1"></circle>
    <circle cx="380" cy="310" r="1.5"></circle>
    <circle cx="900" cy="305" r="1.3"></circle>
    <circle cx="1080" cy="320" r="1.4"></circle>
    <circle cx="1210" cy="285" r="1.2"></circle>
  </g>

  
  <g transform="translate(40 40)" filter="url(#soft)">
    <rect x="0" y="0" width="1200" height="280" rx="20" ry="20" fill="none" stroke="#E89669" stroke-width="3" stroke-linecap="round" stroke-dasharray="22 78" pathLength="100" opacity="0.8">
      
    </rect>
  </g>

  
  <g transform="translate(120 110)">
    <circle cx="0" cy="0" r="20" fill="url(#halo)">
      
      
    </circle>
    <circle cx="0" cy="0" r="7" fill="#E89669">
      
    </circle>
