  </g>

  
  <g transform="translate(640 220)" text-anchor="middle" font-family="&#39;Fraunces&#39;, &#39;Times New Roman&#39;, Georgia, serif" font-weight="700" font-size="150">
    <text>
      <tspan fill="#5BA9A3">I</tspan><tspan fill="#E89669">C</tspan><tspan fill="#5BA9A3">ED</tspan><tspan fill="#8A827C">26</tspan>
    </text>
  </g>

  
  <line x1="555" y1="248" x2="725" y2="248" stroke="#E89669" stroke-width="5" stroke-linecap="round"></line>

  
  <text x="640" y="295" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="500" font-size="22" fill="#5C544E" letter-spacing="0.5">
