<head>

<title>ICED26 — Live Programme</title>
<meta name="description" content="Live programme for ICED26 — Salamanca, 23–26 June 2026. Sessions, rooms, and live status across all conference buildings.">
<meta name="theme-color" content="#E89669">

<!-- Favicons -->
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="favicon-192.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">

<!-- Open Graph -->
<meta property="og:type" content="website">
<meta property="og:site_name" content="ICED26">
<meta property="og:title" content="ICED26 — Live Programme">
<meta property="og:description" content="Salamanca · 23–26 June 2026. Live sessions, rooms, and schedule across all conference buildings.">
<meta property="og:image" content="og-image.png">
<meta property="og:image:width" content="1200">

<!-- Twitter / X -->
<meta name="twitter:card" content="summary_large_image">

<meta name="twitter:description" content="Salamanca · 23–26 June 2026. Live sessions, rooms, and schedule across all conference buildings.">
<meta name="twitter:image" content="og-image.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  .visually-hidden { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data/programme.js"></script>
<script type="text/babel" src="app.jsx"></script>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useMemo } = React;
const { Header, DayTabs, BuildingTabs, Grid, MobileList, SessionModal, SessionSearch, AgendaModal, I18N, madridParts, sessionId, findSessionById, useFavorites } = window.ICED26App;

// One-time cleanup of the old "organizer mode" unlock flag — that flow has
// been retired in favour of the dedicated /admin login page.
try { localStorage.removeItem("iced26-unlocked"); } catch {}

function App() {
  const data = window.ICED26_DATA;
  // Always follow the real Europe/Madrid clock. Outside the conference dates
  // the now-line simply won't appear (no day matches "today").
  const [now, setNow] = useState(() => new Date());
  const [lang, setLang] = useState("en");
  const [agendaOpen, setAgendaOpen] = useState(false);
  const [favorites, toggleFavorite] = useFavorites();

  // Tick once a minute so the now-line and live/past/future states refresh.
  useEffect(() => {
    const id = setInterval(() => setNow(new Date()), 60000);
    return () => clearInterval(id);
  }, []);

  // Auto-pick the day matching "today" if we're inside the conference window;
  // otherwise default to day 0 (pre-conference Tuesday).
  const initialDay = useMemo(() => {
    const todayKey = madridParts(now).dayKey;
    const idx = data.meta.days.indexOf(todayKey);
    return idx >= 0 ? idx : 0;
  }, []);
  const [dayIdx, setDayIdx] = useState(initialDay);
  const [buildingId, setBuildingId] = useState(() => data.clusters[0]?.id || "auditorio");

  const [activeSession, setActiveSession] = useState(null);

  // Jump to a session: switch day + building, then open its modal.
  const openSession = (s) => {
    if (!s) return;
    const dIdx = data.meta.days.indexOf(s.day);
    if (dIdx >= 0) setDayIdx(dIdx);
    if (s.cluster) setBuildingId(s.cluster);
    setActiveSession(s);
  };

  // Deep-link: ?session=YYYYMMDD-HHMM-room — open that session on load.
  useEffect(() => {
    const params = new URLSearchParams(window.location.search);
    const id = params.get("session");
    if (!id) return;
    const s = findSessionById(data, id);
    if (s) openSession(s);
  }, []);

  // Keep URL in sync with the open modal so the user can copy the address bar too.
  useEffect(() => {
    const url = new URL(window.location.href);
    if (activeSession) {
      url.searchParams.set("session", sessionId(activeSession));
    } else {
      url.searchParams.delete("session");
    }
    window.history.replaceState(null, "", url.toString());
  }, [activeSession]);

  const t = I18N[lang];

  return (
    <>
      <Header data={data} now={now} lang={lang} setLang={setLang} t={t} favorites={favorites} onOpenAgenda={() => setAgendaOpen(true)} />
      <DayTabs data={data} dayIdx={dayIdx} setDayIdx={setDayIdx} now={now} lang={lang} t={t}>
        <SessionSearch data={data} t={t} lang={lang} onSelect={openSession} />
      </DayTabs>
      {/* Mobile-only search row — on desktop the search lives inside DayTabs (top-right);
          on mobile that aside is hidden, so we render a second SessionSearch here that's
          only shown by CSS at small widths. They share no state since the input clears
          after each pick. */}
      <div className="search-row-mobile">
        <SessionSearch data={data} t={t} lang={lang} onSelect={openSession} />
      </div>
      <BuildingTabs data={data} buildingId={buildingId} setBuildingId={setBuildingId} dayIdx={dayIdx} now={now} lang={lang} t={t} />
      <Grid data={data} dayIdx={dayIdx} buildingId={buildingId} now={now} liveStyle="halo" lang={lang} t={t} onSessionClick={openSession} favorites={favorites} onToggleFavorite={toggleFavorite} />
      <MobileList data={data} dayIdx={dayIdx} buildingId={buildingId} now={now} lang={lang} t={t} onSessionClick={openSession} favorites={favorites} onToggleFavorite={toggleFavorite} />
      <SessionModal session={activeSession} t={t} lang={lang} now={now} onClose={() => setActiveSession(null)} favorites={favorites} onToggleFavorite={toggleFavorite} />
      <AgendaModal open={agendaOpen} onClose={() => setAgendaOpen(false)} favorites={favorites} data={data} t={t} lang={lang} now={now} onSessionClick={openSession} onToggleFavorite={toggleFavorite} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
