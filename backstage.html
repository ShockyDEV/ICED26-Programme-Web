<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<!-- Content-Security-Policy — defense in depth. Same baseline as the public
     index.html: 'unsafe-inline' + 'unsafe-eval' for Babel Standalone JSX
     compilation, everything else locked to self + unpkg + Google Fonts.
     Plus api.github.com on connect-src so the admin's "Publicar" flow
     can commit data/programme.js directly via the GitHub Contents API. -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://api.github.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'">
<title>ICED26 - Live programme</title>
<meta name="description" content="Live programme for ICED26 — Salamanca, 23–26 June 2026.">
<meta name="theme-color" content="#E89669">
<meta name="robots" content="noindex,nofollow">

<!-- Favicons -->
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="favicon-192.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="admin-styles.css">
</head>
<body class="admin-body">
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" integrity="sha384-DGyLxAyjq0f9SPpVevD6IgztCFlnMF6oW/XQGmfe+IsZ8TqEiDrcHkMLKI6fiB/Z" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" integrity="sha384-gTGxhz21lVGYNMcdJOyq01Edg0jhn/c22nsx0kyqP0TxaV5WVdsSH1fSDUf5YJj1" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Cache-bust the LOCAL scripts so the admin always loads the freshly-published
     programme data + code (same approach as index.html). Without this the
     backstage shows a stale, cached data/programme.js — e.g. a just-published
     YouTube/room change appears empty here until a hard refresh. -->
<script>
  (function () {
    var v = Date.now();
    function add(src, babel) {
      document.write('<scr' + 'ipt ' + (babel ? 'type="text/babel" ' : '') +
        'src="' + src + '?v=' + v + '"><\/scr' + 'ipt>');
    }
    add('data/programme.js', false);
    add('crypto.js', false);
    add('admin-app.jsx', true);
  })();
</script>

<script type="text/babel" data-presets="env,react">
const { AdminApp } = window.ICED26AdminApp;
ReactDOM.createRoot(document.getElementById("root")).render(<AdminApp />);
</script>
</body>
</html>
